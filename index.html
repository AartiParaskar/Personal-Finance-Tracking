<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };
 const app = initializeApp(firebaseConfig);
  window.auth = getAuth(app);
  window.db = getFirestore(app);
</script>


  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body class="bg-gray-100 p-5">

<header class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">💰 Finance Tracker</h1>
  <button id="darkModeToggle" class="bg-black text-white px-3 py-1 rounded">🌙</button>
</header>

<!-- Dashboard -->
<div class="grid grid-cols-3 gap-4 mb-6">
  <div class="bg-green-500 text-white p-4 rounded">Total ₹<span id="total">0</span></div>
  <div class="bg-blue-500 text-white p-4 rounded">Budget ₹<span id="budget">0</span></div>
  <div class="bg-red-500 text-white p-4 rounded">Remaining ₹<span id="remaining">0</span></div>
</div>

<!-- Form -->
<div class="flex flex-wrap gap-3 mb-6">
  <input id="title" class="border p-2" placeholder="Title">
  <input id="amount" type="number" class="border p-2" placeholder="Amount">
  <input id="date" type="date" class="border p-2">

  <select id="category" class="border p-2">
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Other</option>
  </select>

  <button onclick="addOrUpdateExpense()" class="bg-green-500 text-white px-4 py-2 rounded">
    Save
  </button>
</div>

<!-- Filters -->
<div class="flex flex-wrap gap-3 mb-6">
  <input id="search" onkeyup="renderExpenses()" placeholder="Search..." class="border p-2">

  <input type="month" id="monthFilter" onchange="renderExpenses()" class="border p-2">

  <select id="filter" onchange="renderExpenses()" class="border p-2">
    <option value="All">All</option>
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Other</option>
  </select>

  <input id="budgetInput" type="number" placeholder="Budget" class="border p-2">
  <button onclick="setBudget()" class="bg-blue-500 text-white px-3 py-2 rounded">Set</button>
</div>

<!-- Expense List -->
<ul id="expenseList" class="space-y-3"></ul>

<canvas id="chart" class="mt-6"></canvas>

<script src="script.js"></script>
</body>
</html>
